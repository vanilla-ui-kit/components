name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build & test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      # Zero dependencies — no npm install anywhere.
      - name: Build dist/
        run: npm run build

      - name: dist/ committed in sync with sources
        run: git diff --exit-code -- dist

      - name: Run tests
        run: npm test
