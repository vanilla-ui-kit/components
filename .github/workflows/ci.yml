name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: Build & test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}

      # Zero runtime dependencies — no npm install. build:min fetches a
      # pinned terser via npx so minified output is byte-stable.
      - name: Build dist/
        run: npm run build && npm run build:min

      - name: dist/ committed in sync with sources
        run: git diff --exit-code -- dist

      - name: Size budgets
        run: npm run size

      - name: Run tests
        run: npm test

  browser:
    name: Browser smoke + a11y audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: browser-actions/setup-chrome@v1
        id: chrome

      - name: Install puppeteer-core (pinned, not saved)
        run: npm install --no-save puppeteer-core@23.11.1

      # Loads index.html, theme.html, demo/admin.html, and every component's
      # examples.html in real Chromium: fails on page errors, console errors,
      # frozen main threads, and critical axe-core violations.
      - name: Run browser tests
        env:
          CHROME_BIN: ${{ steps.chrome.outputs.chrome-path }}
        run: npm run test:browser
